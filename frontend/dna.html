<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Schwep — Your Design DNA</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/dna.css">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <img src="assets/images/schwep.png" alt="Schwep Logo" class="loading-logo">
  </div>

  <div class="sky"></div>
  
  <!-- Clouds -->
  <img class="cloud cl-bl" src="assets/images/transparentcloud1.png" alt="Cloud">
  <img class="cloud cl-br" src="assets/images/transparentcloud2.png" alt="Cloud">
  <img class="cloud cl-ml" src="assets/images/transparentcloud1.png" alt="Cloud">
  <img class="cloud cl-mr" src="assets/images/transparentcloud2.png" alt="Cloud">

  <!-- Navigation -->
  <nav class="dna-nav">
    <a href="index.html" class="nav-logo"><img src="assets/images/schwep.png" alt="schwep"></a>
    <div class="nav-actions">
      <a class="btn-new" href="archive.html">View Archive</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="dna-container">
    <div class="dna-header">
      <div class="dna-eyebrow">Your Design DNA Analysis</div>
      <h1 class="dna-title">Your <em>Design DNA</em> Revealed</h1>
      <p class="dna-subtitle">Based on your selections, here's your complete design specification.</p>
    </div>

    <div class="dna-layout">
      <!-- Live Mockup -->
      <div class="dna-mockup">
        <div class="mockup-container" id="mockup-container">
          <!-- Mockup will be generated by JavaScript -->
        </div>
      </div>

      <!-- Nutrition Facts Spec Sheet -->
      <div class="dna-spec">
        <div class="spec-box">
          <div class="spec-top">
            <img class="spec-logo" src="assets/images/schwep.png" alt="Schwep">
            <div class="spec-sub">Design DNA Receipt</div>
            <img class="spec-blimp" src="assets/images/MARTYBLIMP.png" alt="Blimp">
          </div>
          <div class="spec-panel">
            <div class="spec-row">
              <span class="spec-k">Frame:</span>
              <span class="spec-v" id="spec-frame">-</span>
            </div>
            <div class="spec-row">
              <span class="spec-k">Shape:</span>
              <span class="spec-v" id="spec-shape">-</span>
            </div>
            <div class="spec-row">
              <span class="spec-k">Tone:</span>
              <span class="spec-v" id="spec-tone">-</span>
            </div>
            <div class="spec-row">
              <span class="spec-k">Finish:</span>
              <span class="spec-v" id="spec-finish">-</span>
            </div>
            <div class="spec-row">
              <span class="spec-k">Radius:</span>
              <span class="spec-v" id="spec-radius">-</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="dna-actions">
      <button class="btn-copy" id="btn-copy">Copy DNA Code</button>
      <a href="archive.html" class="btn-archive">View Archive</a>
      <button class="btn-again" id="btn-again">Start Over</button>
    </div>
  </main>

  <script src="assets/js/dna.js"></script>
</body>
</html>
